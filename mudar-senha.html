<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Troca de Senha Obrigatória - Sistema Escolar</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components-new.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            background: var(--bg-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .change-password-container {
            width: 100%;
            max-width: 450px;
            padding: 2rem;
            animation: fadeIn 0.5s ease-out;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            padding: 2.5rem;
            box-shadow: var(--shadow-xl);
            position: relative;
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header i {
            font-size: 3rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
            display: block;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .input-with-icon {
            position: relative;
        }

        .input-with-icon i:first-child {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .form-control {
            width: 100%;
            padding: 0.8rem 1rem 0.8rem 3rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(var(--primary-rgb), 0.2);
            outline: none;
        }

        .password-requirements {
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: var(--radius-md);
            list-style: none;
        }

        .requirement {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .requirement.valid {
            color: var(--success);
        }

        .requirement.valid i::before {
            content: "\f272";
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
        }

        .btn-primary {
            width: 100%;
            padding: 1rem;
            margin-top: 1rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    <!-- Tailwind CSS Play CDN — preflight desabilitado para nao conflitar com CSS existente -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      if (window.tailwind) {
        tailwind.config = { corePlugins: { preflight: false } };
      }
    </script></head>

<body>
    <div class="change-password-container">
        <div class="card">
            <div class="header">
                <i class="bi bi-shield-lock-fill"></i>
                <h1>Segurança em Primeiro Lugar</h1>
                <p>Sua conta foi criada pela direção. Para sua segurança, você deve definir uma senha pessoal antes de continuar.</p>
            </div>

            <form id="changePasswordForm">
                <div class="form-group">
                    <label for="newPassword">Nova Senha</label>
                    <div class="input-with-icon">
                        <i class="bi bi-key"></i>
                        <input type="password" id="newPassword" class="form-control" placeholder="••••••••" required>
                        <button type="button" class="password-toggle" id="btn-toggle-new-pass">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                    <ul class="password-requirements">
                        <li id="req-length" class="requirement"><i class="bi bi-circle"></i> Mínimo 8 caracteres</li>
                        <li id="req-upper" class="requirement"><i class="bi bi-circle"></i> Uma letra maiúscula</li>
                        <li id="req-number" class="requirement"><i class="bi bi-circle"></i> Um número</li>
                        <li id="req-special" class="requirement"><i class="bi bi-circle"></i> Um caractere especial</li>
                    </ul>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirme a Nova Senha</label>
                    <div class="input-with-icon">
                        <i class="bi bi-key-fill"></i>
                        <input type="password" id="confirmPassword" class="form-control" placeholder="••••••••" required>
                        <button type="button" class="password-toggle" id="btn-toggle-confirm-pass">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" id="btnSubmit" class="btn btn-primary" disabled>
                    <i class="bi bi-check-circle"></i> Definir Senha e Entrar
                </button>
            </form>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="js/api-config.js"></script>
    <script src="js/database.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await auth.init();
            
            // Se não estiver logado ou não precisar mudar senha, volta pro dashboard (que vai lidar com auth)
            if (!auth.isAuthenticated()) {
                window.location.href = 'index.html';
                return;
            }

            if (sessionStorage.getItem('forcePasswordChange') !== 'true') {
                window.location.href = 'dashboard.html';
                return;
            }

            const passInput = document.getElementById('newPassword');
            const confirmInput = document.getElementById('confirmPassword');
            const btnSubmit = document.getElementById('btnSubmit');

            // Validação em tempo real (mesma do Primeiro Acesso)
            passInput.addEventListener('input', () => {
                const val = passInput.value;
                const reqs = {
                    length: val.length >= 8,
                    upper: /[A-Z]/.test(val),
                    number: /[0-9]/.test(val),
                    special: /[^A-Za-z0-9]/.test(val)
                };

                Object.keys(reqs).forEach(key => {
                    const el = document.getElementById(`req-${key}`);
                    if (reqs[key]) {
                        el.classList.add('valid');
                        el.querySelector('i').className = 'bi bi-check-circle-fill';
                    } else {
                        el.classList.remove('valid');
                        el.querySelector('i').className = 'bi bi-circle';
                    }
                });

                validateForm();
            });

            confirmInput.addEventListener('input', validateForm);

            function validateForm() {
                const val = passInput.value;
                const isValid = val.length >= 8 && 
                              /[A-Z]/.test(val) && 
                              /[0-9]/.test(val) && 
                              /[^A-Za-z0-9]/.test(val) &&
                              val === confirmInput.value;
                
                btnSubmit.disabled = !isValid;
            }

            document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                showLoading(btnSubmit);

                try {
                    const res = await fetch(`${window.API_BASE_URL}/auth/update-password-force`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${auth.getToken()}`
                        },
                        body: JSON.stringify({ password: passInput.value })
                    });

                    const json = await res.json();
                    if (json.success) {
                        showToast('Senha atualizada com sucesso!', 'success');
                        sessionStorage.removeItem('forcePasswordChange');
                        setTimeout(() => window.location.href = 'dashboard.html', 1500);
                    } else {
                        throw new Error(json.error);
                    }
                } catch (err) {
                    showToast(err.message, 'error');
                } finally {
                    hideLoading(btnSubmit);
                }
            });
        });
    </script>
    <script src="js/vendor.js"></script>
    <script defer src="js/events/mudar-senha-events.js"></script>
</body>

</html>
