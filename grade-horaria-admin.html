<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Gestão de Grade Horária - Sistema Escolar</title>
    <!-- CSS -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components-new.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/cadastro.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .form-card {
            background: var(--surface-card);
            border-radius: var(--radius-lg);
            padding: 2rem;
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
        }

        .grade-list {
            background: var(--surface-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background: rgba(255, 255, 255, 0.05);
            font-weight: 600;
        }
    </style>
    <link rel="stylesheet" href="css/parallax-glass.css">
    <link rel="stylesheet" href="css/neo-brutal.css">
    <!-- Tailwind CSS Play CDN — preflight desabilitado para nao conflitar com CSS existente -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      if (window.tailwind) {
        tailwind.config = { corePlugins: { preflight: false } };
      }
    </script></head>

<body>
    <div class="dashboard-page">
        <header class="dashboard-header">
            <div class="header-content">
                <div class="header-logo">
                    <i class="bi bi-mortarboard-fill"></i>
                    <span>Sistema Escolar</span>
                </div>
                <div class="header-right">
                    <button class="btn btn-secondary btn-sm" data-href="dashboard.html">
                        <i class="bi bi-arrow-left"></i> Voltar
                    </button>
                </div>
            </div>
        </header>

        <main class="dashboard-main">
            <div class="dashboard-container">
                <div class="page-header">
                    <h1>Gestão de Grade Horária</h1>
                    <p class="text-secondary">Defina os horários permitidos para cada professor</p>
                </div>

                <!-- Form -->
                <div class="form-card">
                    <h3>Adicionar Novo Horário</h3>
                    <form id="gradeForm"
                        style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem;">

                        <div class="form-group">
                            <label class="form-label">Professor *</label>
                            <select id="selectProfessor" class="form-input" required>
                                <option value="">Carregando...</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Turma *</label>
                            <select id="selectTurma" class="form-input" required>
                                <option value="">Carregando...</option>
                            </select>
                        </div>

                        <div class="form-group" style="grid-column: 1 / -1;">
                            <label class="form-label">Disciplina *</label>
                            <div class="checkbox-grid" id="materiasGrid"
                                style="grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));">
                                <p class="text-secondary"
                                    style="grid-column: 1/-1; padding: 1rem; text-align: center; background: rgba(255,255,255,0.05); border-radius: var(--radius-md);">
                                    Selecione um professor para visualizar as matérias.
                                </p>
                            </div>
                            <input type="hidden" id="inputDisciplina" class="form-input">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Dia da Semana *</label>
                            <select id="selectDia" class="form-input" required>
                                <option value="1">Segunda-feira</option>
                                <option value="2">Terça-feira</option>
                                <option value="3">Quarta-feira</option>
                                <option value="4">Quinta-feira</option>
                                <option value="5">Sexta-feira</option>
                                <option value="6">Sábado</option>
                                <option value="0">Domingo</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Hora Início *</label>
                            <input type="time" id="horaInicio" class="form-input" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Hora Fim *</label>
                            <input type="time" id="horaFim" class="form-input" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Aulas Seguidas (Max) *</label>
                            <input type="number" id="aulasSeguidas" class="form-input" value="1" min="1" max="5"
                                required>
                        </div>

                        <div class="form-full" style="grid-column: 1 / -1; display: flex; justify-content: flex-end;">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save"></i> Salvar Horário na Grade
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Botão de Conclusão Geral para dar feedback de "Fim da Tarefa" -->
                <div style="display: flex; justify-content: flex-end; margin-bottom: 1rem;">
                    <button class="btn btn-success"
                        id="btn-salvar-grade">
                        <i class="bi bi-check-circle-fill"></i> Concluir e Atualizar Grade
                    </button>
                </div>

                <!-- List/Filter -->
                <div class="form-card">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
                        <h3>Horários Cadastrados</h3>
                        <select id="filterProfessor" class="form-input" style="max-width:300px;">
                            <option value="">Filtrar por Professor...</option>
                        </select>
                    </div>
                    <div class="grade-list">
                        <table id="tabelaGrade">
                            <thead>
                                <tr>
                                    <th>Professor</th>
                                    <th>Turma</th>
                                    <th>Disciplina</th>
                                    <th>Dia</th>
                                    <th>Horário</th>
                                    <th>Ações</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- JS Populates -->
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script defer src="js/database.js?v=2"></script>
    <script defer src="js/auth.js?v=2"></script>
    <script defer src="js/utils.js?v=2"></script>
    <script defer src="js/grade-horaria-admin.js?v=2"></script>
    <script defer src="js/parallax.js"></script>
    <script src="js/vendor.js"></script>
    <script defer src="js/events/grade-horaria-events.js"></script>
</body>

</html>
