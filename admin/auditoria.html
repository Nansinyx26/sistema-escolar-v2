<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Histórico de Auditoria - Admin</title>
    <!-- CSS -->
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components-new.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .audit-card {
            background: var(--surface-card);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
        }

        .audit-table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .critical-action {
            color: #ef4444;
            font-weight: bold;
        }

        .filter-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .filter-item {
            flex: 1;
            min-width: 200px;
        }

        .log-details {
            font-family: monospace;
            font-size: 0.8rem;
            background: rgba(0,0,0,0.2);
            padding: 0.5rem;
            border-radius: 4px;
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>
    <!-- Tailwind CSS Play CDN — preflight desabilitado para nao conflitar com CSS existente -->
    <!-- Offline Compiled Tailwind CSS -->
    <link rel="stylesheet" href="../css/tailwind-built.css">    <link rel="stylesheet" href="../css/responsive-global.css?v=1.0">
    <link rel="stylesheet" href="../css/splash-screen.css?v=1.0">
    <link rel="stylesheet" href="../css/reactions.css?v=1.0">
</head>

<body>
    <!-- Splash Screen (PWA) -->
    <div id="splashScreen">
        <div class="splash-logo-container">
            <div class="splash-logo">
                <i class="bi bi-mortarboard-fill"></i>
            </div>
            <div class="splash-logo-ring"></div>
        </div>
        <div class="splash-text">
            <h2 class="splash-title">Sistema Escolar</h2>
            <p class="splash-subtitle">Histórico de Auditoria</p>
        </div>
        <div class="splash-progress-container">
            <div class="splash-progress-track">
                <div class="splash-progress-bar"></div>
            </div>
            <div class="splash-progress-text">Inicializando sistema...</div>
        </div>
        <div class="splash-version">v3.0</div>
    </div>
    <script src="../js/splash-screen.js"></script>

    <div class="dashboard-page">
        <header class="dashboard-header">
            <div class="header-content">
                <div class="header-left">
                    <button class="btn btn-secondary btn-sm" onclick="window.location.href='../dashboard.html'">
                        <i class="bi bi-arrow-left"></i> Voltar
                    </button>
                    <div class="header-logo">
                        <i class="bi bi-journal-check"></i>
                        <span>Histórico de Auditoria (LGPD)</span>
                    </div>
                </div>
                <div class="header-right">
                    <button class="btn btn-primary btn-sm" onclick="loadLogs()">
                        <i class="bi bi-arrow-clockwise"></i> Atualizar Logs
                    </button>
                </div>
            </div>
        </header>

        <main class="container">
            <div class="audit-card">
                <div class="filter-bar">
                    <div class="filter-item">
                        <label class="text-sm text-secondary">Filtrar por Usuário</label>
                        <input type="text" id="filterUser" class="form-control" placeholder="E-mail ou nome...">
                    </div>
                    <div class="filter-item">
                        <label class="text-sm text-secondary">Ação</label>
                        <select id="filterAction" class="form-control">
                            <option value="">Todas as ações</option>
                            <option value="CREATE_USER">Criação de Usuário</option>
                            <option value="DELETE_USER">Exclusão de Usuário</option>
                            <option value="UPDATE_GRADE">Alteração de Nota</option>
                            <option value="LOGIN_FAILED">Falha de Login</option>
                            <option value="FIRST_ACCESS_ACTIVATE">Ativação de Conta</option>
                        </select>
                    </div>
                    <div class="filter-item d-flex align-items-end">
                        <button class="btn btn-primary w-100" onclick="loadLogs()">
                            <i class="bi bi-search"></i> Pesquisar
                        </button>
                    </div>
                </div>

                <div class="audit-table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Data/Hora</th>
                                <th>Usuário</th>
                                <th>Ação</th>
                                <th>Recurso</th>
                                <th>IP/Dispositivo</th>
                                <th>Detalhes</th>
                            </tr>
                        </thead>
                        <tbody id="auditLogsBody">
                            <tr>
                                <td colspan="6" class="text-center">Carregando logs de segurança...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/api-config.js"></script>
    <script src="../js/database.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await db.init();
            await auth.init();
            if (auth.getCurrentUser()?.perfil !== 'admin') {
                alert('Acesso restrito a administradores');
                window.location.href = '../dashboard.html';
                return;
            }
            loadLogs();
        });

        async function loadLogs() {
            const tbody = document.getElementById('auditLogsBody');
            const userFilter = document.getElementById('filterUser').value;
            const actionFilter = document.getElementById('filterAction').value;

            try {
                let url = `${window.API_BASE_URL}/audit/logs?`;
                if (userFilter) url += `usuario=${userFilter}&`;
                if (actionFilter) url += `acao=${actionFilter}&`;

                const res = await fetch(url, { credentials: 'include' });
                
                // Handle non-JSON responses (e.g. 401 redirect)
                const contentType = res.headers.get('content-type') || '';
                if (!contentType.includes('application/json')) {
                    throw new Error('Sessão expirada. Faça login novamente.');
                }
                
                const json = await res.json();

                if (!json.success) throw new Error(json.error);

                if (json.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center">Nenhum evento registrado com estes filtros.</td></tr>';
                    return;
                }

                tbody.innerHTML = json.data.map(log => {
                    const isCritical = ['DELETE_USER', 'RESET_PASSWORD', 'ROTATE_SECRET_CODE'].includes(log.acao);
                    const date = new Date(log.data).toLocaleString('pt-BR');
                    
                    return `
                        <tr>
                            <td class="text-secondary">${date}</td>
                            <td>
                                <strong>${log.usuarioNome || 'Sistema'}</strong><br>
                                <small>${log.usuarioEmail || '-'}</small>
                            </td>
                            <td class="${isCritical ? 'critical-action' : ''}">${log.acao}</td>
                            <td>${log.recurso || '-'}</td>
                            <td>
                                <small>${log.ip}</small><br>
                                <small class="text-secondary">${log.dispositivo}</small>
                            </td>
                            <td>
                                <div class="log-details" title="${log.detalhes?.descricao || ''}">
                                    ${log.detalhes?.descricao || 'Sem descrição'}
                                </div>
                            </td>
                        </tr>
                    `;
                }).join('');

            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-danger text-center">Erro ao carregar logs: ${err.message}</td></tr>`;
            }
        }
    </script>
    <script src="../js/vendor.js"></script>
    <script defer src="../js/reactions.js"></script>
</body>

</html>
