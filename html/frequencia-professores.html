<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Frequência e Lançamentos - Sistema Escolar</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components-new.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/cadastro.css">
    <link rel="stylesheet" href="../css/grade-horaria.css">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        .form-card {
            background: var(--surface-card);
            border-radius: var(--radius-lg);
            padding: 2.5rem;
            border: 1px solid var(--border-primary);
            box-shadow: var(--shadow-md);
            margin-bottom: 2.5rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }

        .form-full {
            grid-column: 1 / -1;
        }

        .readonly-field {
            background-color: rgba(255, 255, 255, 0.05);
            cursor: not-allowed;
            opacity: 0.8;
        }

        .form-input.is-valid {
            border-color: #22c55e !important;
            padding-right: 2.5rem;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 8 8'%3e%3cpath fill='%2322c55e' d='M2.3 6.73L.6 4.53c-.4-1.04.46-1.4 1.1-.8l1.1 1.4 3.4-3.8c.6-.63 1.6-.27 1.2.7l-4 4.6c-.43.5-.8.4-1.1.1z'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right calc(0.375em + 0.1875rem) center;
            background-size: calc(0.75em + 0.375rem) calc(0.75em + 0.375rem);
        }

        @media (max-width: 768px) {
            .form-card {
                padding: 1.5rem;
            }
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <link rel="stylesheet" href="../css/parallax-glass.css">
    <link rel="stylesheet" href="../css/neo-brutal.css">
    <!-- Tailwind CSS Play CDN — preflight desabilitado para nao conflitar com CSS existente -->
    <!-- Offline Compiled Tailwind CSS -->
    <link rel="stylesheet" href="../css/tailwind-built.css">    <link rel="stylesheet" href="../css/responsive-global.css?v=1.0">
    <link rel="stylesheet" href="../css/splash-screen.css?v=1.0">
    <link rel="stylesheet" href="../css/reactions.css?v=1.0">
</head>

<body>
    <!-- Splash Screen (PWA) -->
    <div id="splashScreen">
        <div class="splash-logo-container">
            <div class="splash-logo">
                <i class="bi bi-mortarboard-fill"></i>
            </div>
            <div class="splash-logo-ring"></div>
        </div>
        <div class="splash-text">
            <h2 class="splash-title">Sistema Escolar</h2>
            <p class="splash-subtitle">Frequência e Lançamentos</p>
        </div>
        <div class="splash-progress-container">
            <div class="splash-progress-track">
                <div class="splash-progress-bar"></div>
            </div>
            <div class="splash-progress-text">Inicializando sistema...</div>
        </div>
        <div class="splash-version">v3.0</div>
    </div>
    <script src="../js/splash-screen.js"></script>

    <div class="dashboard-page">
        <!-- Header -->
        <header class="dashboard-header">
            <div class="header-content">
                <div class="header-left">
                    <div class="header-logo">
                        <i class="bi bi-mortarboard-fill"></i>
                        <span>Sistema Escolar</span>
                    </div>
                </div>
            </div>
        </header>

        <main class="dashboard-main">
            <div class="dashboard-container">
                <div class="page-header"
                    style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <div>
                        <h1>Frequência e Lançamentos</h1>
                        <p class="text-secondary">Registro de atividades e ausências</p>
                    </div>
                    <div>
                        <button class="btn btn-outline" id="btnMinhaGrade" type="button" style="margin-right: 1rem;">
                            <i class="bi bi-calendar-week"></i> Minha Grade
                        </button>
                        <button class="btn btn-outline" data-href="dashboard.html">
                            <i class="bi bi-arrow-left"></i> Voltar
                        </button>
                    </div>
                </div>

                <!-- Modal de Grade -->
                <div id="modalGrade" class="modal-overlay"
                    style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); z-index: 9999; justify-content: center; align-items: center;">
                    <div
                        style="background: var(--surface-card); padding: 2rem; border-radius: var(--radius-lg); width: 90%; max-width: 600px; border: 1px solid var(--border-color); box-shadow: 0 4px 20px rgba(0,0,0,0.5);">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                            <h3>Minha Grade Horária</h3>
                            <button id="closeModalGrade"
                                style="background:none; border:none; color:white; font-size: 1.5rem; cursor: pointer;">&times;</button>
                        </div>
                        <div id="conteudoGrade" style="max-height: 400px; overflow-y: auto;">
                            <!-- Tabela será injetada aqui -->
                            <p>Carregando...</p>
                        </div>
                    </div>
                </div>

                <div class="form-card">
                    <h3 style="margin-bottom: 1rem;"><i class="bi bi-calendar-check" style="color: var(--primary);"></i> Registrar Lançamento</h3>
                    <form id="attendanceForm">
                        <div class="form-grid grade-grid-layout">
                            <div class="form-full">
                                <label class="form-label">Data do Lançamento</label>
                                <input type="date" id="dataLancamento" class="form-input" required>
                            </div>

                            <div class="form-group" id="containerProfessor">
                                <label class="form-label">Nome do Professor</label>
                                <input type="text" id="nomeProfessor" class="form-input readonly-field" readonly>
                                <select id="selectProfessor" class="form-input" style="display: none;">
                                    <option value="">Selecione o Professor...</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label class="form-label">Nome da Escola</label>
                                <input type="text" id="nomeEscola" class="form-input readonly-field" readonly>
                            </div>

                            <div class="form-group" style="grid-column: 1 / -1;">
                                <label class="form-label">Matéria *</label>
                                <div class="checkbox-grid" id="materiasGrid"
                                    style="grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));">
                                    <!-- Populated dynamicaly -->
                                </div>
                                <input type="hidden" id="materia" class="form-input">
                            </div>

                            <div class="form-group">
                                <label class="form-label">Classe / Turma *</label>
                                <select id="classe" class="form-input" required>
                                    <option value="">Selecione...</option>
                                    <!-- Populated dynamicaly or manually for now -->
                                    <option value="1A">1A</option>
                                    <option value="1B">1B</option>
                                    <option value="1C">1C</option>
                                    <option value="1D">1D</option>
                                    <option value="2A">2A</option>
                                    <option value="2B">2B</option>
                                    <option value="2C">2C</option>
                                    <option value="2D">2D</option>
                                    <option value="3A">3A</option>
                                    <option value="3B">3B</option>
                                    <option value="3C">3C</option>
                                    <option value="3D">3D</option>
                                    <option value="4A">4A</option>
                                    <option value="4B">4B</option>
                                    <option value="4C">4C</option>
                                    <option value="4D">4D</option>
                                    <option value="5A">5A</option>
                                    <option value="5B">5B</option>
                                    <option value="5C">5C</option>
                                    <option value="5D">5D</option>
                                </select>
                            </div>

                            <div class="form-full">
                                <label class="form-label">Quantidade de Aulas *</label>
                                <input type="number" id="quantidadeAulas" class="form-input" min="1" max="10" required
                                    placeholder="Ex: 2">
                            </div>

                            <div class="form-full">
                                <label class="form-label">Observação (Opcional)</label>
                                <textarea id="observacao" class="form-input" rows="3"
                                    placeholder="Detalhes sobre o lançamento..."></textarea>
                            </div>
                        </div>

                        <div class="form-actions" style="margin-top: 2rem; text-align: right;">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save"></i> Salvar Lançamento
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="../js/api-config.js"></script>
    <script defer src="../js/database.js"></script>
    <script defer src="../js/auth.js"></script>
    <script defer src="../js/utils.js"></script>
    <script defer src="../js/frequencia-professores.js"></script>
    <script defer src="../js/parallax.js"></script>
    <script src="../js/vendor.js"></script>
    <script defer src="../js/reactions.js"></script>
</body>

</html>
