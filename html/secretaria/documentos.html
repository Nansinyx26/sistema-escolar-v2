<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentos - Secretaria</title>
    <link rel="icon" type="image/png" href="../../favicon/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/variables.css?v=2.0">
    <link rel="stylesheet" href="../../css/base.css?v=2.0">
    <link rel="stylesheet" href="../../css/components-new.css?v=2.0">
    <link rel="stylesheet" href="../../css/dashboard.css?v=2.1">
    <link rel="stylesheet" href="../../css/responsive-global.css?v=1.1">
    <link rel="stylesheet" href="../../css/dashboard-premium.css?v=1.0">
    <link rel="stylesheet" href="../../js/libs/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../../css/tailwind-built.css">
    <style>
        .sec-page { max-width:1100px; margin:0 auto; padding:2rem 1.5rem; }
        .sec-header { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem; margin-bottom:2rem; }
        .sec-header h1 { font-size:1.5rem; font-weight:700; color:#fff; margin:0; display:flex; align-items:center; gap:0.75rem; }
        .sec-form-card { background:rgba(30,41,59,0.6); border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:1.5rem; margin-bottom:1.5rem; }
        .sec-form-card h3 { color:#fff; font-size:1rem; margin:0 0 1rem; display:flex; align-items:center; gap:0.5rem; }
        .sec-form-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:1rem; }
        .sec-input { width:100%; padding:0.6rem 0.8rem; background:rgba(15,23,42,0.8); border:1px solid rgba(255,255,255,0.12); border-radius:10px; color:#fff; font-size:0.85rem; }
        .sec-input:focus { outline:none; border-color:#10b981; }
        .sec-select { width:100%; padding:0.6rem 0.8rem; background:rgba(15,23,42,0.8); border:1px solid rgba(255,255,255,0.12); border-radius:10px; color:#fff; font-size:0.85rem; }
        .sec-btn { padding:0.6rem 1.2rem; border-radius:10px; font-size:0.85rem; font-weight:600; cursor:pointer; border:none; transition:all 0.2s; }
        .sec-btn-primary { background:#10b981; color:#fff; }
        .sec-btn-primary:hover { background:#059669; }
        .sec-btn-blue { background:#3b82f6; color:#fff; }
        .sec-btn-blue:hover { background:#2563eb; }
        .sec-btn-outline { background:transparent; color:#10b981; border:1px solid rgba(16,185,129,0.3); text-decoration:none; }
        .doc-preview { background:rgba(15,23,42,0.9); border:1px solid rgba(255,255,255,0.08); border-radius:12px; padding:1.5rem; margin-top:1rem; display:none; }
        .doc-preview h4 { color:#60a5fa; margin:0 0 1rem; }
        .sec-table { width:100%; border-collapse:collapse; font-size:0.85rem; }
        .sec-table th { padding:0.75rem; text-align:left; color:#94a3b8; font-weight:600; font-size:0.75rem; text-transform:uppercase; border-bottom:1px solid rgba(255,255,255,0.06); }
        .sec-table td { padding:0.75rem; color:#cbd5e1; border-bottom:1px solid rgba(255,255,255,0.04); }
        .sec-badge { padding:3px 10px; border-radius:20px; font-size:0.7rem; font-weight:600; }
        .sec-badge-green { background:rgba(16,185,129,0.15); color:#10b981; }
        .sec-badge-blue { background:rgba(59,130,246,0.15); color:#3b82f6; }
        .sec-toast { position:fixed; bottom:20px; right:20px; padding:1rem 1.5rem; border-radius:12px; font-size:0.85rem; z-index:9999; animation:slideUp .3s; }
        .sec-toast-success { background:#10b981; color:#fff; }
        .sec-toast-error { background:#ef4444; color:#fff; }
        @keyframes slideUp { from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1} }
    </style>
</head>
<body>
<div class="dashboard-page" id="pageWrapper">
    <div class="dashboard-bg"><div class="orb orb-primary"></div><div class="orb orb-secondary"></div></div>
    <main class="dashboard-main">
        <div class="sec-page">
            <div class="sec-header">
                <h1><i class="bi bi-file-earmark-text" style="color:#3b82f6;"></i> Emissão de Documentos</h1>
                <a href="painel.html" class="sec-btn sec-btn-outline"><i class="bi bi-arrow-left"></i> Voltar</a>
            </div>

            <!-- Gerar Documento -->
            <div class="sec-form-card">
                <h3><i class="bi bi-printer" style="color:#10b981;"></i> Gerar Documento</h3>
                <div class="sec-form-grid">
                    <div><label style="font-size:0.75rem;color:#94a3b8;">ID do Aluno</label><input id="docAlunoId" class="sec-input" placeholder="ID do aluno" required></div>
                    <div><label style="font-size:0.75rem;color:#94a3b8;">Tipo de Documento</label>
                        <select id="docTipo" class="sec-select">
                            <option value="declaracao-matricula">Declaração de Matrícula</option>
                            <option value="declaracao-frequencia">Declaração de Frequência</option>
                            <option value="historico-escolar">Histórico Escolar</option>
                        </select>
                    </div>
                </div>
                <div style="margin-top:1rem;display:flex;gap:0.5rem;">
                    <button class="sec-btn sec-btn-primary" onclick="gerarDocumento()"><i class="bi bi-file-earmark-plus"></i> Gerar</button>
                    <button class="sec-btn sec-btn-blue" id="btnPrint" style="display:none;" onclick="imprimirDoc()"><i class="bi bi-printer"></i> Imprimir</button>
                </div>
            </div>

            <!-- Preview -->
            <div class="doc-preview" id="docPreview">
                <h4><i class="bi bi-eye"></i> Pré-visualização do Documento</h4>
                <div id="docContent" style="background:#fff; color:#000; padding:2rem; border-radius:8px; font-family:serif; line-height:1.6;"></div>
            </div>

            <!-- Histórico de Documentos -->
            <div class="sec-form-card" style="margin-top:1.5rem;">
                <h3><i class="bi bi-clock-history" style="color:#8b5cf6;"></i> Documentos Emitidos do Aluno</h3>
                <div class="sec-form-grid" style="grid-template-columns:1fr auto;">
                    <input id="histAlunoId" class="sec-input" placeholder="ID do aluno para ver histórico">
                    <button class="sec-btn sec-btn-primary" onclick="carregarHistorico()"><i class="bi bi-search"></i> Buscar</button>
                </div>
                <div style="overflow-x:auto;margin-top:1rem;">
                    <table class="sec-table">
                        <thead><tr><th>Documento</th><th>Tipo</th><th>Nº</th><th>Data</th><th>Emitido por</th></tr></thead>
                        <tbody id="histBody"><tr><td colspan="5" style="text-align:center;color:#94a3b8;">Informe um ID de aluno acima</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="../../js/api-config.js"></script>
    <script src="../../js/csrf-helper.js"></script>
<script defer src="../../js/database.js?v=3"></script>
<script defer src="../../js/auth.js?v=3"></script>
<script defer src="../../js/utils.js?v=3"></script>
<script>
const API = () => window.API_BASE_URL || '/api';
function toast(m,t='success'){const d=document.createElement('div');d.className=`sec-toast sec-toast-${t}`;d.textContent=m;document.body.appendChild(d);setTimeout(()=>d.remove(),3000);}

document.addEventListener('DOMContentLoaded', async () => {
    if (typeof db !== 'undefined') await db.init();
    if (typeof auth !== 'undefined') await auth.init();
});

async function gerarDocumento() {
    const alunoId = document.getElementById('docAlunoId').value;
    const tipo = document.getElementById('docTipo').value;
    if (!alunoId) return toast('Informe o ID do aluno', 'error');
    try {
        const res = await fetch(`${API()}/secretaria/documentos/${tipo}/${alunoId}`, { method:'POST', credentials:'include', headers: window.csrfHeaders(false) });
        const json = await res.json();
        if (json.success) {
            document.getElementById('docContent').innerHTML = json.data.conteudoHTML;
            document.getElementById('docPreview').style.display = 'block';
            document.getElementById('btnPrint').style.display = 'inline-flex';
            toast(`Documento gerado: ${json.data.documento.numeroDocumento}`);
        } else toast(json.error, 'error');
    } catch(e) { toast('Erro ao gerar documento', 'error'); }
}

function imprimirDoc() {
    const content = document.getElementById('docContent').innerHTML;
    const w = window.open('', '_blank');
    w.document.write(`<html><head><title>Documento</title><style>body{font-family:serif;padding:2rem;line-height:1.6;}table{width:100%;border-collapse:collapse;}th,td{border:1px solid #333;padding:8px;text-align:left;}</style></head><body>${content}</body></html>`);
    w.document.close();
    w.print();
}

async function carregarHistorico() {
    const id = document.getElementById('histAlunoId').value;
    if (!id) return toast('Informe o ID do aluno', 'error');
    try {
        const res = await fetch(`${API()}/secretaria/documentos/historico/${id}`, { credentials:'include' });
        const json = await res.json();
        const body = document.getElementById('histBody');
        if (json.success && json.data.length > 0) {
            body.innerHTML = json.data.map(d => `<tr>
                <td>${d.titulo}</td>
                <td><span class="sec-badge sec-badge-blue">${d.tipo.replace(/_/g,' ')}</span></td>
                <td>${d.numeroDocumento || '-'}</td>
                <td>${new Date(d.createdAt).toLocaleDateString('pt-BR')}</td>
                <td>${d.emitidoPorNome || '-'}</td>
            </tr>`).join('');
        } else body.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#94a3b8;">Nenhum documento encontrado</td></tr>';
    } catch(e) { toast('Erro ao buscar histórico', 'error'); }
}
</script>
<script src="../../js/sidebar-voice.js?v=4.0"></script>
<script src="../../js/chatbot-ia.js?v=4.0"></script>
</body>
</html>
