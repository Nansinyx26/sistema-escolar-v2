<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunicados - Secretaria</title>
    <link rel="icon" type="image/png" href="../../favicon/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/variables.css?v=2.0">
    <link rel="stylesheet" href="../../css/base.css?v=2.0">
    <link rel="stylesheet" href="../../css/components-new.css?v=2.0">
    <link rel="stylesheet" href="../../css/dashboard.css?v=2.1">
    <link rel="stylesheet" href="../../css/responsive-global.css?v=1.1">
    <link rel="stylesheet" href="../../css/dashboard-premium.css?v=1.0">
    <link rel="stylesheet" href="../../js/libs/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../../css/tailwind-built.css">
    <style>
        .sec-page { max-width:1100px; margin:0 auto; padding:2rem 1.5rem; }
        .sec-header { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem; margin-bottom:2rem; }
        .sec-header h1 { font-size:1.5rem; font-weight:700; color:#fff; margin:0; display:flex; align-items:center; gap:0.75rem; }
        .sec-form-card { background:rgba(30,41,59,0.6); border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:1.5rem; margin-bottom:1.5rem; }
        .sec-form-card h3 { color:#fff; font-size:1rem; margin:0 0 1rem; display:flex; align-items:center; gap:0.5rem; }
        .sec-input,.sec-select,.sec-textarea { width:100%; padding:0.6rem 0.8rem; background:rgba(15,23,42,0.8); border:1px solid rgba(255,255,255,0.12); border-radius:10px; color:#fff; font-size:0.85rem; font-family:inherit; }
        .sec-textarea { min-height:120px; resize:vertical; }
        .sec-input:focus,.sec-textarea:focus { outline:none; border-color:#10b981; }
        .sec-btn { padding:0.6rem 1.2rem; border-radius:10px; font-size:0.85rem; font-weight:600; cursor:pointer; border:none; transition:all 0.2s; }
        .sec-btn-primary { background:#10b981; color:#fff; }
        .sec-btn-outline { background:transparent; color:#10b981; border:1px solid rgba(16,185,129,0.3); text-decoration:none; }
        .sec-com-card { background:rgba(30,41,59,0.5); border:1px solid rgba(255,255,255,0.08); border-radius:12px; padding:1.25rem; margin-bottom:1rem; transition:all 0.2s; }
        .sec-com-card:hover { border-color:rgba(16,185,129,0.2); }
        .sec-com-header { display:flex; justify-content:space-between; align-items:flex-start; gap:1rem; margin-bottom:0.5rem; }
        .sec-com-title { font-size:1rem; font-weight:600; color:#fff; }
        .sec-com-meta { font-size:0.75rem; color:#64748b; }
        .sec-com-body { font-size:0.85rem; color:#94a3b8; line-height:1.5; }
        .sec-badge { padding:3px 10px; border-radius:20px; font-size:0.7rem; font-weight:600; }
        .sec-badge-green { background:rgba(16,185,129,0.15); color:#10b981; }
        .sec-toast { position:fixed; bottom:20px; right:20px; padding:1rem 1.5rem; border-radius:12px; font-size:0.85rem; z-index:9999; animation:slideUp .3s; }
        .sec-toast-success { background:#10b981; color:#fff; }
        .sec-toast-error { background:#ef4444; color:#fff; }
        @keyframes slideUp { from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1} }
        .sec-checkbox-grid { display:flex; flex-wrap:wrap; gap:0.5rem; margin-top:0.5rem; }
        .sec-checkbox-item { display:flex; align-items:center; gap:0.4rem; padding:0.3rem 0.8rem; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:8px; font-size:0.8rem; color:#cbd5e1; cursor:pointer; }
        .sec-checkbox-item input { accent-color:#10b981; }
    </style>
</head>
<body>
<div class="dashboard-page" id="pageWrapper">
    <div class="dashboard-bg"><div class="orb orb-primary"></div><div class="orb orb-secondary"></div></div>
    <main class="dashboard-main">
        <div class="sec-page">
            <div class="sec-header">
                <h1><i class="bi bi-megaphone" style="color:#10b981;"></i> Comunicados</h1>
                <a href="painel.html" class="sec-btn sec-btn-outline"><i class="bi bi-arrow-left"></i> Voltar</a>
            </div>

            <!-- Novo Comunicado -->
            <div class="sec-form-card">
                <h3><i class="bi bi-plus-circle" style="color:#10b981;"></i> Novo Comunicado</h3>
                <div style="display:flex;flex-direction:column;gap:1rem;">
                    <div><label style="font-size:0.75rem;color:#94a3b8;">Título</label><input id="comTitulo" class="sec-input" placeholder="Título do comunicado"></div>
                    <div><label style="font-size:0.75rem;color:#94a3b8;">Conteúdo</label><textarea id="comConteudo" class="sec-textarea" placeholder="Escreva o conteúdo do comunicado..."></textarea></div>
                    <div>
                        <label style="font-size:0.75rem;color:#94a3b8;">Destinatários</label>
                        <div class="sec-checkbox-grid">
                            <label class="sec-checkbox-item"><input type="checkbox" value="todos" checked> Todos</label>
                            <label class="sec-checkbox-item"><input type="checkbox" value="professores"> Professores</label>
                            <label class="sec-checkbox-item"><input type="checkbox" value="responsaveis"> Responsáveis</label>
                        </div>
                    </div>
                    <div style="display:flex;gap:1rem;align-items:flex-end;">
                        <div style="flex:1;"><label style="font-size:0.75rem;color:#94a3b8;">Prioridade</label>
                            <select id="comPrioridade" class="sec-select"><option>Normal</option><option>Importante</option><option>Urgente</option></select>
                        </div>
                        <button class="sec-btn sec-btn-primary" onclick="enviarComunicado()"><i class="bi bi-send"></i> Enviar</button>
                    </div>
                </div>
            </div>

            <!-- Lista -->
            <div class="sec-form-card">
                <h3><i class="bi bi-clock-history" style="color:#8b5cf6;"></i> Comunicados Enviados</h3>
                <div id="comList"><div style="text-align:center;color:#94a3b8;padding:2rem;">Carregando...</div></div>
            </div>
        </div>
    </main>
</div>

<script src="../../js/api-config.js"></script>
<script defer src="../../js/database.js?v=3"></script>
<script defer src="../../js/auth.js?v=3"></script>
<script defer src="../../js/utils.js?v=3"></script>
<script>
const API = () => window.API_BASE_URL || '/api';
function toast(m,t='success'){const d=document.createElement('div');d.className=`sec-toast sec-toast-${t}`;d.textContent=m;document.body.appendChild(d);setTimeout(()=>d.remove(),3000);}

document.addEventListener('DOMContentLoaded', async () => {
    if (typeof db !== 'undefined') await db.init();
    if (typeof auth !== 'undefined') await auth.init();
    carregarComunicados();
});

async function enviarComunicado() {
    const titulo = document.getElementById('comTitulo').value;
    const conteudo = document.getElementById('comConteudo').value;
    if (!titulo || !conteudo) return toast('Preencha título e conteúdo', 'error');
    const checkboxes = document.querySelectorAll('.sec-checkbox-grid input:checked');
    const destinatarios = Array.from(checkboxes).map(c => c.value);
    if (destinatarios.length === 0) return toast('Selecione ao menos um destinatário', 'error');
    try {
        const res = await fetch(`${API()}/secretaria/comunicados`, {
            method:'POST', credentials:'include',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ titulo, conteudo, destinatarios, prioridade: document.getElementById('comPrioridade').value })
        });
        const json = await res.json();
        if (json.success) { toast('Comunicado enviado!'); document.getElementById('comTitulo').value=''; document.getElementById('comConteudo').value=''; carregarComunicados(); }
        else toast(json.error, 'error');
    } catch(e) { toast('Erro ao enviar', 'error'); }
}

async function carregarComunicados() {
    try {
        const res = await fetch(`${API()}/secretaria/comunicados`, { credentials:'include' });
        const json = await res.json();
        const list = document.getElementById('comList');
        if (json.success && json.data.length > 0) {
            list.innerHTML = json.data.slice(0, 20).map(c => `
                <div class="sec-com-card">
                    <div class="sec-com-header">
                        <div>
                            <div class="sec-com-title">${c.titulo}</div>
                            <div class="sec-com-meta">${c.autorNome || c.diretorNome || 'Secretaria'} · ${new Date(c.dataCriacao).toLocaleDateString('pt-BR')}</div>
                        </div>
                        <span class="sec-badge sec-badge-green">${c.categoria || 'Secretaria'}</span>
                    </div>
                    <div class="sec-com-body">${c.conteudo.replace(/<[^>]*>/g, '').substring(0, 200)}${c.conteudo.length > 200 ? '...' : ''}</div>
                </div>
            `).join('');
        } else list.innerHTML = '<div style="text-align:center;color:#94a3b8;padding:2rem;">Nenhum comunicado encontrado</div>';
    } catch(e) { console.error(e); }
}
</script>
<script src="../../js/sidebar-voice.js?v=4.0"></script>
<script src="../../js/chatbot-ia.js?v=4.0"></script>
</body>
</html>
