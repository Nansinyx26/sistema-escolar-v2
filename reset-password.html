<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Redefinir Senha">
    <title>Redefinir Senha - Sistema Escolar</title>

    <link rel="icon" type="image/png" href="/favicon/favicon.png">    <link rel="apple-touch-icon" href="/favicon/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components-new.css">
    <link rel="stylesheet" href="css/login-new.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/parallax-glass.css">
    <link rel="stylesheet" href="css/neo-brutal.css">
    <!-- Tailwind CSS Play CDN — preflight desabilitado para nao conflitar com CSS existente -->
    <!-- Offline Compiled Tailwind CSS -->
    <link rel="stylesheet" href="css/tailwind-built.css">    <link rel="stylesheet" href="css/responsive-global.css?v=1.0">
    <link rel="stylesheet" href="css/splash-screen.css?v=1.0">
    <link rel="stylesheet" href="css/reactions.css?v=1.0">
</head>

<body>
    <!-- Splash Screen (PWA) -->
    <div id="splashScreen">
        <div class="splash-logo-container">
            <div class="splash-logo">
                <i class="bi bi-mortarboard-fill"></i>
            </div>
            <div class="splash-logo-ring"></div>
        </div>
        <div class="splash-text">
            <h2 class="splash-title">Sistema Escolar</h2>
            <p class="splash-subtitle">Redefinir Senha</p>
        </div>
        <div class="splash-progress-container">
            <div class="splash-progress-track">
                <div class="splash-progress-bar"></div>
            </div>
            <div class="splash-progress-text">Inicializando sistema...</div>
        </div>
        <div class="splash-version">v3.0</div>
    </div>
    <script src="js/splash-screen.js"></script>

    <div class="login-page">
        <div class="login-background">
            <div class="gradient-orb orb-1"></div>
            <div class="gradient-orb orb-2"></div>
            <div class="gradient-orb orb-3"></div>
        </div>

        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <div class="login-logo">
                        <i class="bi bi-key-fill"></i>
                    </div>
                    <h1>Redefinir Senha</h1>
                    <p>Crie uma nova senha para sua conta</p>
                </div>

                <div class="login-body">
                    <form id="resetForm" class="login-form">
                        <div class="form-group">
                            <label class="form-label" for="newPassword">Nova Senha</label>
                            <div class="input-group">
                                <i class="input-icon bi bi-lock"></i>
                                <input type="password" id="newPassword" class="form-input" placeholder="••••••••"
                                    required minlength="6">
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="confirmPassword">Confirmar Senha</label>
                            <div class="input-group">
                                <i class="input-icon bi bi-lock-fill"></i>
                                <input type="password" id="confirmPassword" class="form-input" placeholder="••••••••"
                                    required minlength="6">
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary btn-block btn-lg">
                            <span>Alterar Senha</span>
                            <i class="bi bi-check-lg"></i>
                        </button>

                        <div class="text-center mt-md">
                            <a href="login.html" class="link-secondary">Voltar para Login</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="js/api-config.js"></script>
    <script defer src="js/utils.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            if (!token) {
                showToast('Token inválido ou ausente', 'error');
                setTimeout(() => window.location.href = 'login.html', 3000);
                return;
            }

            const form = document.getElementById('resetForm');
            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const password = document.getElementById('newPassword').value;
                const confirm = document.getElementById('confirmPassword').value;

                if (password !== confirm) {
                    showToast('As senhas não coincidem', 'error');
                    return;
                }

                if (password.length < 6) {
                    showToast('A senha deve ter no mínimo 6 caracteres', 'error');
                    return;
                }

                const submitBtn = form.querySelector('button[type="submit"]');
                const originalText = submitBtn.innerHTML;
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span class="spinner"></span> Processando...';

                try {
                    // Detect API URL
                    const baseUrl = window.API_BASE_URL;

                    const res = await fetch(`${baseUrl}/auth/reset-password`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token, password })
                    });

                    const data = await res.json();

                    if (data.success) {
                        showToast('Senha alterada com sucesso!', 'success');
                        setTimeout(() => window.location.href = 'login.html', 2000);
                    } else {
                        showToast(data.error || 'Erro ao alterar senha', 'error');
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = originalText;
                    }
                } catch (error) {
                    console.error('Erro:', error);
                    showToast('Erro de conexão', 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalText;
                }
            });
        });
    </script>
    <script defer src="js/parallax.js"></script>
    <script src="js/vendor.js"></script>
    <script defer src="js/reactions.js"></script>
</body>

</html>
